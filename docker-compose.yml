services:

  app:
    build: .
    container_name: devops-app

    ports:
      - "3000:3000"

    environment:
      PORT: 3000
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root123
      DB_NAME: devopsdb

    depends_on:
      - db

  db:
    image: mysql:8
    container_name: devops-db

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: devopsdb

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: